name: Instagram Reel 毎日自動生成

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日7:00 JST
  workflow_dispatch:
    inputs:
      theme_index:
        description: 'テーマ番号 (0-6, 空白=自動)'
        required: false
        default: ''

jobs:
  generate-reel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 日本語フォントをインストール
        run: sudo apt-get install -y fonts-ipafont-gothic

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: リール動画を生成
        run: |
          if [ -n "${{ github.event.inputs.theme_index }}" ]; then
            python reel_generator.py ${{ github.event.inputs.theme_index }}
          else
            python reel_generator.py
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 生成ファイルをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reels/
          git diff --cached --quiet || git commit -m "Add Instagram reel $(date +'%Y-%m-%d')"
          git push
