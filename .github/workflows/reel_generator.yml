name: Instagram Reel スライド画像を毎日自動生成

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日7:00 JST (UTC+9)
  workflow_dispatch:
    inputs:
      theme_index:
        description: 'テーマ番号 (0=制作実績 1=裏側 2=Tips 3=料金 4=失敗例 5=成功共通点 6=差がつくポイント)'
        required: false
        default: ''

jobs:
  generate-slides:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 日本語フォントをインストール
        run: sudo apt-get install -y fonts-ipafont-gothic

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: スライド画像を生成
        run: |
          if [ -n "${{ github.event.inputs.theme_index }}" ]; then
            python reel_generator.py ${{ github.event.inputs.theme_index }}
          else
            python reel_generator.py
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 生成画像をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reels/
          git diff --cached --quiet || git commit -m "Add reel slides $(date +'%Y-%m-%d' --date='TZ=\"Asia/Tokyo\" now')"
          git push
